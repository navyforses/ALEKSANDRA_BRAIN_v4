# Pre-commit hooks for ALEKSANDRA_BRAIN
#
# Phase 0 — FND-07 (secret scan), FND-01/02 (MRI-leak lint preview).
# Run once after cloning:
#     pip install pre-commit
#     pre-commit install
#
# Hooks run automatically before every `git commit`.
# A failure blocks the commit; fix the issue and re-stage.

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        name: gitleaks (secret scan)
        description: Block commits that contain API keys, tokens, or other secrets

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-added-large-files
        args: ["--maxkb=1024"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: no-remote-fetch-in-viewer
        name: no remote fetch in viewer/ (FND-02)
        entry: bash scripts/check-no-remote-fetch.sh
        language: system
        files: ^viewer/
        pass_filenames: false
        description: Block commits adding remote fetch/axios/XHR from viewer/ — MRI must stay client-side
