# nixpacks.toml — Phase 5 Railway/Nixpacks builder config
#
# Forces a Python build path regardless of the root-level package.json
# (which is a stale leftover from an earlier prototype; the real Next.js
# viewer lives in viewer/ and is deployed via Vercel, not Railway).
#
# Pinned versions match requirements.txt + the .venv used in CI.

providers = ["python"]

[phases.setup]
nixPkgs = ["python312", "gcc", "tesseract"]

[phases.install]
cmds = [
  "python -m venv --copies /opt/venv",
  ". /opt/venv/bin/activate && pip install --upgrade pip",
  ". /opt/venv/bin/activate && pip install -r requirements.txt"
]

[phases.build]
cmds = ["echo 'no build step for Python worker'"]

[start]
cmd = ". /opt/venv/bin/activate && python -X utf8 -m scripts.perception_worker"

[variables]
PYTHONUNBUFFERED = "1"
PYTHONDONTWRITEBYTECODE = "1"
