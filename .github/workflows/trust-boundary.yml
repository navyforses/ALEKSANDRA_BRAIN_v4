name: Trust Boundary Lint

# Phase 0 — FND-01, FND-02
# Blocks any change that would let MRI data escape the browser.

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trust-boundary:
    name: viewer/ imaging boundary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps (skip ESLint when viewer/ empty)
        run: |
          # Phase 0 — viewer/ has only .gitkeep so far. We install only when
          # there is something to lint to avoid requiring a package-lock.json
          # before the Next.js app is scaffolded (Phase 7 deliverable).
          if find viewer -maxdepth 4 \( -name '*.ts' -o -name '*.tsx' \) 2>/dev/null | grep -q .; then
            npm install --no-audit --no-fund
          else
            echo "viewer/ is empty — skipping npm install (no lint targets)"
          fi

      - name: ESLint — no imaging imports in server routes (FND-01)
        run: |
          if find viewer -maxdepth 4 \( -name '*.ts' -o -name '*.tsx' \) 2>/dev/null | grep -q .; then
            npx eslint viewer --max-warnings 0
          else
            echo "viewer/ has no TS/TSX yet — skipping ESLint."
          fi

      - name: No remote fetch from viewer/ (FND-02)
        run: bash scripts/check-no-remote-fetch.sh
