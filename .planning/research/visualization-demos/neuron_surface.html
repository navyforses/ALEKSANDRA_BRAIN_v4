<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ნეირონის 3D მოდელი — ალექსანდრას ტვინის უჯრედი</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #080814;
            overflow: hidden;
            color: white;
        }
        #canvas-container { width: 100vw; height: 100vh; position: relative; }
        #info-panel {
            position: absolute; top: 20px; left: 20px;
            background: rgba(8,8,20,0.92); padding: 16px;
            border-radius: 12px; max-width: 300px;
            border: 1px solid rgba(200,100,100,0.15);
        }
        #info-panel h1 { font-size: 14px; margin-bottom: 4px; color: #e8a0a0; }
        #info-panel p { font-size: 10px; line-height: 1.5; color: #888; }
        #controls {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%); display: flex;
            gap: 8px; flex-wrap: wrap; justify-content: center;
        }
        button {
            background: rgba(200,100,100,0.1);
            border: 1px solid rgba(200,100,100,0.25);
            color: #e8a0a0; padding: 8px 14px;
            border-radius: 20px; cursor: pointer;
            font-size: 11px; transition: all 0.3s;
        }
        button:hover { background: rgba(200,100,100,0.2); }
        button.active { background: rgba(200,100,100,0.3); border-color: #e8a0a0; }
        #legend {
            position: absolute; top: 20px; right: 20px;
            background: rgba(8,8,20,0.92); padding: 12px;
            border-radius: 8px; font-size: 10px;
            border: 1px solid rgba(200,100,100,0.15);
        }
        .legend-item { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
        .legend-color { width: 10px; height: 10px; border-radius: 50%; }
        #stats {
            position: absolute; bottom: 70px; right: 20px;
            background: rgba(8,8,20,0.85); padding: 10px;
            border-radius: 6px; font-size: 10px; color: #888;
        }
        #stats span { color: #e8a0a0; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="info-panel">
        <h1>🔬 პირამიდული ნეირონი</h1>
        <p>ალექსანდრას ტვინის ერთი უჯრედი — 2,775 ვოქსელი<br>
        Soma + Apical dendrite + Basal dendrites + Axon + Myelin + Spines + Synapses</p>
    </div>
    <div id="legend">
        <div class="legend-item"><div class="legend-color" style="background:#c85a5a;"></div><span>Soma (კუთხული ტანი)</span></div>
        <div class="legend-item"><div class="legend-color" style="background:#5a8ac8;"></div><span>Apical dendrite</span></div>
        <div class="legend-item"><div class="legend-color" style="background:#3a5a8a;"></div><span>Basal dendrites</span></div>
        <div class="legend-item"><div class="legend-color" style="background:#c8a85a;"></div><span>Axon</span></div>
        <div class="legend-item"><div class="legend-color" style="background:#e0e0e0;"></div><span>Myelin sheath</span></div>
        <div class="legend-item"><div class="legend-color" style="background:#5ac85a;"></div><span>Node of Ranvier</span></div>
        <div class="legend-item"><div class="legend-color" style="background:#a85ac8;"></div><span>Dendritic spines</span></div>
        <div class="legend-item"><div class="legend-color" style="background:#c8855a;"></div><span>Synaptic boutons</span></div>
    </div>
    <div id="stats">
        <div>Points: <span id="pointCount">0</span></div>
        <div>FPS: <span id="fps">0</span></div>
    </div>
    <div id="controls">
        <button onclick="setFilter('all')" id="btn-all" class="active">🔬 ყველა</button>
        <button onclick="setFilter('soma')" id="btn-soma">🔴 Soma</button>
        <button onclick="setFilter('dendrites')" id="btn-dendrites">🔵 Dendrites</button>
        <button onclick="setFilter('axon')" id="btn-axon">🟡 Axon</button>
        <button onclick="setFilter('myelin')" id="btn-myelin">⚪ Myelin</button>
        <button onclick="toggleSignal()" id="btn-signal">⚡ Action Potential</button>
        <button onclick="toggleRotate()" id="btn-rot">🔄 Rotate</button>
        <button onclick="resetCam()">🏠 Reset</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="neuron_data.js"></script>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x080814);
        scene.fog = new THREE.Fog(0x080814, 50, 200);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(40, 30, 60);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 5, 0);

        // Shaders
        const vertexShader = `
            attribute float pointRadius;
            attribute vec3 compColor;
            attribute float compType;
            attribute float axonDist;
            uniform float uSignalTime;
            uniform float uSignalActive;
            varying vec3 vColor;
            varying float vAlpha;

            void main() {
                vec3 baseColor = compColor;

                // Action potential glow along axon
                if (uSignalActive > 0.5 && axonDist > 0.0) {
                    float wave = axonDist - uSignalTime * 80.0;
                    float glow = exp(-wave * wave * 0.5);
                    baseColor = mix(baseColor, vec3(1.0, 0.9, 0.3), glow * 0.8);
                }

                // Slight rim for all components
                vec3 n = normalize(normalMatrix * normal);
                vec3 viewDir = normalize(cameraPosition - position);
                float rim = pow(1.0 - max(0.0, dot(viewDir, n)), 2.0) * 0.2;
                vColor = baseColor + vec3(0.5, 0.6, 0.8) * rim;

                vAlpha = 0.85;
                if (compType > 6.5) vAlpha = 0.95; // boutons more opaque

                vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
                gl_PointSize = pointRadius * (400.0 / -mvPos.z);
                gl_Position = projectionMatrix * mvPos;
            }
        `;

        const fragmentShader = `
            varying vec3 vColor;
            varying float vAlpha;

            void main() {
                vec2 c = gl_PointCoord - vec2(0.5);
                float d = length(c);
                if (d > 0.5) discard;
                float alpha = (1.0 - smoothstep(0.25, 0.5, d)) * vAlpha;
                gl_FragColor = vec4(vColor, alpha);
            }
        `;

        // Component type mapping and colors
        const TYPE_MAP = {
            'soma': 0, 'apical': 1, 'basal': 2, 'axon': 3,
            'myelin': 4, 'node': 5, 'spine': 6, 'bouton': 7
        };
        const COLORS = {
            'soma': [0.78, 0.35, 0.35],
            'apical': [0.35, 0.54, 0.78],
            'basal': [0.23, 0.35, 0.54],
            'axon': [0.78, 0.66, 0.35],
            'myelin': [0.88, 0.88, 0.88],
            'node': [0.35, 0.78, 0.35],
            'spine': [0.66, 0.35, 0.78],
            'bouton': [0.78, 0.52, 0.35],
        };

        let pointsMesh = null;
        let currentFilter = 'all';
        let signalActive = false;
        let signalTime = 0;

        function createPoints(filter) {
            if (!NEURON_POINTS || NEURON_POINTS.length === 0) return;

            let pts = NEURON_POINTS;
            if (filter === 'soma') pts = pts.filter(p => p.t === 'soma');
            else if (filter === 'dendrites') pts = pts.filter(p => p.t === 'apical' || p.t === 'basal' || p.t === 'spine');
            else if (filter === 'axon') pts = pts.filter(p => p.t === 'axon' || p.t === 'node' || p.t === 'bouton');
            else if (filter === 'myelin') pts = pts.filter(p => p.t === 'myelin' || p.t === 'node');

            const geo = new THREE.BufferGeometry();
            const pos = [], radii = [], colors = [], types = [], axonDists = [];

            // Precompute axon distances for signal animation
            // Find axon start (lowest Z soma/axon point)
            const axonPts = pts.filter(p => ['axon','myelin','node','bouton'].includes(p.t));
            let axonStartZ = axonPts.length > 0 ? Math.min(...axonPts.map(p => p.z)) : 0;

            for (const p of pts) {
                pos.push(p.x, p.y, p.z);

                // Size based on component
                let r = p.r * 3.0;
                if (p.t === 'soma') r *= 1.5;
                else if (p.t === 'spine') r *= 0.6;
                else if (p.t === 'bouton') r *= 2.0;
                radii.push(r);

                colors.push(...(COLORS[p.t] || [0.5, 0.5, 0.5]));
                types.push(TYPE_MAP[p.t] || 0);

                // Axon distance for signal propagation
                let ad = 0;
                if (['axon','myelin','node','bouton'].includes(p.t)) {
                    ad = Math.abs(p.z - axonStartZ);
                }
                axonDists.push(ad);
            }

            geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
            geo.setAttribute('pointRadius', new THREE.Float32BufferAttribute(radii, 1));
            geo.setAttribute('compColor', new THREE.Float32BufferAttribute(colors, 3));
            geo.setAttribute('compType', new THREE.Float32BufferAttribute(types, 1));
            geo.setAttribute('axonDist', new THREE.Float32BufferAttribute(axonDists, 1));
            // Add dummy normal attribute
            geo.setAttribute('normal', new THREE.Float32BufferAttribute(new Float32Array(pos.length), 3));

            const mat = new THREE.ShaderMaterial({
                vertexShader, fragmentShader,
                transparent: true, depthWrite: false, blending: THREE.NormalBlending,
                uniforms: {
                    uSignalTime: { value: 0 },
                    uSignalActive: { value: 0 }
                }
            });

            if (pointsMesh) {
                scene.remove(pointsMesh);
                pointsMesh.geometry.dispose();
                pointsMesh.material.dispose();
            }

            pointsMesh = new THREE.Points(geo, mat);
            scene.add(pointsMesh);
            document.getElementById('pointCount').textContent = pts.length.toLocaleString();

            return mat;
        }

        let neuronMaterial = null;

        function setFilter(f) {
            currentFilter = f;
            document.querySelectorAll('#controls button').forEach(b => {
                if (!b.id.includes('signal') && !b.id.includes('rot') && !b.textContent.includes('Reset'))
                    b.classList.remove('active');
            });
            document.getElementById('btn-' + f).classList.add('active');
            neuronMaterial = createPoints(f);
        }

        function toggleSignal() {
            signalActive = !signalActive;
            signalTime = 0;
            document.getElementById('btn-signal').classList.toggle('active');
            if (!signalActive && neuronMaterial) {
                neuronMaterial.uniforms.uSignalActive.value = 0;
            }
        }

        function toggleRotate() {
            controls.autoRotate = !controls.autoRotate;
            document.getElementById('btn-rot').classList.toggle('active');
        }

        function resetCam() {
            camera.position.set(40, 30, 60);
            controls.target.set(0, 5, 0);
            controls.update();
        }

        window.addEventListener('load', () => {
            setTimeout(() => { neuronMaterial = createPoints('all'); }, 300);
        });

        let lastTime = 0, fc = 0;
        function animate(t) {
            requestAnimationFrame(animate);
            fc++;
            if (t - lastTime > 1000) {
                document.getElementById('fps').textContent = fc;
                fc = 0; lastTime = t;
            }

            if (signalActive && neuronMaterial) {
                signalTime += 0.016;
                neuronMaterial.uniforms.uSignalTime.value = signalTime;
                neuronMaterial.uniforms.uSignalActive.value = 1;
                if (signalTime > 3.0) { signalTime = 0; } // loop
            }

            controls.update();
            renderer.render(scene, camera);
        }
        animate(0);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
